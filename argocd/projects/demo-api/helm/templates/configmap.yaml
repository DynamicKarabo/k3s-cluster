apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "demo-api.fullname" . }}
  labels:
    app: {{ include "demo-api.name" . }}
    chart: {{ include "demo-api.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
