# ── Velero values for k3s-cluster ──
# Lightweight config for single-node. Backups go to local filesystem as a default
# (can be swapped to S3-compatible storage like Hetzner Object Storage later).

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: k3s-backups
      config:
        region: auto
        s3Url: http://minio:9000
        publicUrl: http://minio:9000
        insecure: true
  volumeSnapshotLocation: []
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.10.0
    volumeMounts:
      - mountPath: /target
        name: plugins
snapshotEnabled: false
credentials:
  useSecret: false
schedules:
  daily:
    schedule: "0 2 * * *"
    template:
      ttl: "720h"
      includedNamespaces:
        - demo-api
